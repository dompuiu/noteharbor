name: flutter_viewer
description: Read-only Flutter viewer for Note Harbor archives.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/notes.json
    - assets/data/images/
    - assets/data/images/scraped/
    - assets/data/images/notes/
